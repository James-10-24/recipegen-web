# Local Supabase config. Generated by `supabase init` typically — pre-populated here.
# Run `supabase link --project-ref <ref>` to bind to your cloud project.

project_id = "recipegen"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
# Auth confirmation emails redirect to one of these. The web bridge
# (https://ideagen.tech/auth/callback) bounces the user into the app via
# the recipegen://auth/callback deep link; both URLs are needed.
additional_redirect_urls = [
  "recipegen://",
  "recipegen://auth/callback",
  "https://ideagen.tech/auth/callback",
]
jwt_expiry = 3600
enable_signup = true
# Guest mode — users can try the app without an email/password.
# Anonymous users get is_anonymous=true on auth.users; same RLS works.
# When they later sign up, we updateUser() to upgrade in place — same
# user_id, all data preserved.
enable_anonymous_sign_ins = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # set true in production

[storage]
enabled = true
file_size_limit = "5MiB"
